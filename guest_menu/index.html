<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Ordering System</title>
    <style>
        :root {
            --primary: rgb(93, 16, 16);  
            --bg: rgb(208, 195, 195);             
           --light-green: #BCD9A2;          
    --dark-green: #6D9E51;   
            --dark: #2C2C2C;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: #FFFFFF;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(168, 35, 35, 0.08);
            text-align: center;
            margin-top: 40px;
        }

        h1 { 
            color: var(--primary); 
            margin-bottom: 8px; 
            font-size: 28px;
        }
        
        p { 
            color: #555; 
            margin-top: 0;
            font-size: 15px;
            line-height: 1.5;
        }

        .btn-location {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            margin: 20px 0;
        }

        .btn-location:hover { 
            background-color: #000000; 
        }
        
        .btn-location:active {
            transform: scale(0.98);
        }

        .status-card {
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.4;
            display: none;
        }

        .status-success { 
            background-color: var(--light-green); 
            color: #2e4d1a; 
            border: 1px solid var(--dark-green); 
        }
        
        .status-error { 
            background-color: #FCE8E6; 
            color: var(--primary); 
            border: 1px solid var(--primary); 
        }
        
        .status-loading {
            background-color: #EAEAEA;
            color: #555;
            border: 1px solid #CCC;
        }

        #menu-section {
            opacity: 0.4;
            pointer-events: none;
            transition: opacity 0.3s ease;
            margin-top: 30px;
            border-top: 2px dashed #DDD;
            padding-top: 20px;
        }

        #menu-section.unlocked {
            opacity: 1;
            pointer-events: auto;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border: 1px solid #EEE;
            border-radius: 8px;
            margin-bottom: 12px;
            background: #FAFAFA;
            text-align: left;
        }

        .menu-item span {
            font-weight: 500;
        }

        .btn-order {
            background-color: var(--dark-green);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            display: none; /* Only shows if can_place_order is true */
        }
        
        .btn-order:hover {
            background-color: #577e41;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome to the Restaurant</h1>
    <p>Please verify your location to place order.</p>

    <button class="btn-location" id="location-btn">Verify </button>
    
    <div id="status-box" class="status-card"></div>

    <div id="menu-section">
        <h3 style="color: var(--dark); margin-bottom: 15px;">Today's Menu</h3>
        
        <div class="menu-item">
            <span>Signature  Pasta</span>
            <strong style="color: var(--primary);">References: ₹350</strong>
        </div>
        
        <div class="menu-item">
            <span> Margherita Pizza</span>
            <strong style="color: var(--primary);">References: ₹420</strong>
        </div>
        
        <button class="btn-order" id="order-btn">Place Order</button>
    </div>
</div>
<script>
    document.getElementById('location-btn').addEventListener('click', () => {
        const statusBox = document.getElementById('status-box');
        statusBox.style.display = 'block';
        statusBox.className = 'status-card status-loading';
        statusBox.innerText = 'Acquiring device GPS streams...';

        // Check hardware compatibility
        if (!navigator.geolocation) {
            statusBox.className = 'status-card status-error';
            statusBox.innerText = 'Geolocation is not supported by your current browser configuration.';
            return;
        }
        const options = {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        };
        navigator.geolocation.getCurrentPosition(sendLocationToBackend, handleGPSError, options);
    });
function handleGPSError(err) {
    const statusBox = document.getElementById('status-box');
    statusBox.className = 'status-card status-error';
    
    // Evaluates explicit hardware status codes returned by the device
    switch(err.code) {
        case err.PERMISSION_DENIED:
            statusBox.innerText = "Location Access Denied: Please reset your browser site permissions to allow order verification.";
            break;
        case err.POSITION_UNAVAILABLE:
            statusBox.innerText = "GPS Network Error: Your device's satellite signal is currently unavailable. please try again.";
            break;
        case err.TIMEOUT:
            statusBox.innerText = "Location Timeout: The request to capture your hardware coordinates timed out. Check your connection.";
            break;
        default:
            statusBox.innerText = `System Error: An unhandled exception occurred (${err.message}).`;
            break;
    }
}


    function sendLocationToBackend(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const statusBox = document.getElementById('status-box');

        statusBox.className = 'status-card status-loading';
        statusBox.innerText = 'almost there';

        // FIXED FE-ADJUSTMENT: Formatted JSON parameters to match your FastAPI Pydantic schema (GuestLocation)
        const payload = {
            restaurant_id: 1, // Target ID inside your MySQL restaurant_zones table
            latitude: lat,
            longitude: lng
        };

        // Network pipeline connecting to your active FastAPI port
fetch('https://guest-ordering-system.onrender.com/api/validate-location', { 
    method: 'POST',
    headers: {
        'Content-Type': 'application/json'
    },
    body: JSON.stringify(payload)
})
        .then(response => {
            if (!response.ok) {
                throw new Error('Server returned an invalid status code');
            }
            return response.json();
        })
        .then(data => {
            // Unlocks the UI framework for menu access regardless, so they can see items
            document.getElementById('menu-section').classList.add('unlocked');

            // Evaluates specific logic returns dictated by your backend engine file
            if (data.in_zone) {
                statusBox.className = 'status-card status-success';
                statusBox.innerText = data.message; // Custom "Welcome to [Zone Name]!" message from backend
                
                // Show transactional order action button if allowed
                if (data.can_place_order) {
                    document.getElementById('order-btn').style.display = 'block';
                }
            } else {
                statusBox.className = 'status-card status-error';
                statusBox.innerText = data.message; // "You are outside restaurant property limits..." from backend
                document.getElementById('order-btn').style.display = 'none'; // Lock ordering functionality
            }
        })
   .catch(error => {
            const statusBox = document.getElementById('status-box');
            statusBox.className = 'status-card status-error';
            
            // This forces the webpage to print the actual network exception instead of a generic string!
            statusBox.innerText = `Frontend Network Blocked: ${error.message}. Look at the F12 Console for details.`; 
            console.error('Detailed Connection Exception:', error);
        });
    }
</script>
</body>
</html>
